<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Reserva - CompSTOCK</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .header {
            background-color: #4f46e5;
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }
        .header p {
            margin: 10px 0 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #e0e7ff;
        }
        .content {
            padding: 40px 30px;
            color: #1e293b;
            text-align: center;
        }
        .content h2 {
            color: #0f172a;
            margin-top: 0;
            font-size: 24px;
            font-family: 'Georgia', serif;
        }
        .content p {
            line-height: 1.6;
            color: #475569;
            font-size: 16px;
        }
        .highlight {
            background-color: #f1f5f9;
            padding: 20px;
            border-radius: 6px;
            margin: 25px 0;
            color: #0f172a;
            font-weight: 500;
        }
        .footer {
            background-color: #f8fafc;
            padding: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            border-top: 1px solid #f1f5f9;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .footer p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CompSTOCK</h1>
            <p>Plataforma Académica</p>
        </div>
        <div class="content">
            <h2>¡Reserva Confirmada!</h2>
            <p>Hola <strong><span th:text="${username}"></span></strong>,</p>
            <div class="highlight">
                <p th:text="${message}" style="margin: 0; font-size: 18px;"></p>
            </div>
            <p>Gracias por usar CompSTOCK para tus proyectos. ¡Te esperamos en el laboratorio para la entrega de tus materiales!</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 Plataforma de Gestión CompSTOCK.</p>
        </div>
    </div>
</body>
</html>
