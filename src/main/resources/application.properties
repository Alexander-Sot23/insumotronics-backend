spring.application.name=insumotronics

spring.datasource.url=${URL}
spring.datasource.username=${USER_NAME}
spring.datasource.password=${USER_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

app.settings.storage_directory=${STORAGE_DIRECTORY}
app.settings.allowed_extencions=png,jpg,jpeg,mp4,pdf
app.settings.allowed_mime_types=image/png,image/jpeg,image/jpg,video/mp4,application/pdf

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

jwt.secret=${JWT_KEY}
jwt.expiration=1

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

server.address=0.0.0.0

app.minio.endpoint=${MINIO_URL}
app.minio.access-key=${MINIO_USER}
app.minio.secret-key=${MINIO_PASSWORD}
app.minio.bucket=insumotronics
app.minio.region=us-east-1

app.minio.public-url=${MINIO_URL}