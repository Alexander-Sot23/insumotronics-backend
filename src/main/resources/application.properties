spring.application.name=insumotronics

spring.datasource.url=${URL}
spring.datasource.username=${USER_NAME}
spring.datasource.password=${USER_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.settings.storage_directory=${STORAGE_DIRECTORY}
app.settings.allowed_extencions=png,jpg,jpeg,mp4,pdf,svg
app.settings.allowed_mime_types=image/png,image/jpeg,image/jpg,video/mp4,application/pdf,image/svg+xml

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

jwt.secret=${JWT_KEY}
jwt.expiration=1

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${SMTP_KEY}
spring.mail.from=alexandersotelo423@gmail.com

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.minio.endpoint=${MINIO_URL}
app.minio.access-key=${MINIO_USER}
app.minio.secret-key=${MINIO_PASSWORD}
app.minio.bucket=insumotronics
app.minio.public-url=${MINO_URL}

spring.profiles.active=minio